name: WorkSphere CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    name: Backend CI (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint --if-present

      - name: Build Project
        run: npm run build

      - name: Run Tests
        run: npm run test --if-present

  frontend-ci:
    name: Frontend CI (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Code
        run: npm run lint --if-present

      - name: Build Project
        run: npm run build
